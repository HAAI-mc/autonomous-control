# start to end sequential workflow for FACET-II
- type: optimize_laser_steering
  n_steps: 20
  initial_random_evaluations: 10
- type: optimize_schottky
- type: optimize_alignment
  n_steps: 100
  region_fraction: 0.15
- type: minimize_energy_spread
- type: minimize_injector_emittance
  n_steps: 3
  variables:
    SOLN:IN10:121:BCTRL: [0.39, 0.41]
    QUAD:IN10:121:BCTRL: [-0.008, 0.008]
    QUAD:IN10:122:BCTRL: [-0.008, 0.008]
- type: tcav_phasing
  max_scan_range: [80.0, 100.0]
  n_iterations: 5
  n_initial_points: 5
  tcav_on_amplitude: 4.0
